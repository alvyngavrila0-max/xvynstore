<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-labelledby="title">
  <title id="title">XVY logo</title>
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#2754d6" />
      <stop offset="1" stop-color="#14348f" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="32" ry="32" fill="url(#bgGrad)" />

  <!-- subtle soft shadow for the letters -->
  <g transform="translate(0,4)" opacity="0.14" fill="#000">
    <text x="50%" y="58%" text-anchor="middle" font-family="Segoe UI, Roboto, Arial, sans-serif" font-weight="800" font-size="118">xvy</text>
  </g>

  <!-- main letters -->
  <text x="50%" y="56%" text-anchor="middle" font-family="Segoe UI, Roboto, Arial, sans-serif" font-weight="800" font-size="118" fill="#FFFFFF" letter-spacing="-6">xvy</text>

  <!-- small accent: diagonal connector between letters -->
  <path d="M88 128 L124 92" stroke="#FFD15C" stroke-width="6" stroke-linecap="round" opacity="0.95" />
  <path d="M168 128 L132 92" stroke="#FFD15C" stroke-width="6" stroke-linecap="round" opacity="0.95" />
</svg>
